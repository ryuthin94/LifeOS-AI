<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOS AI - Premium Mobile UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Mobile UI/UX Design System</p>
          <h1>LifeOS AI</h1>
          <p class="hero-copy">A premium futuristic mobile operating layer for daily life, designed in dark glass, electric blue, purple accents, and polished iOS-inspired components.</p>
        </div>
        <div class="hero-phone" aria-label="LifeOS AI dashboard preview">
          <div class="phone mini-phone">
            <div class="screen dashboard-preview"></div>
          </div>
        </div>
      </section>

      <section class="system-strip" aria-label="Design system">
        <div class="system-item"><span></span>Glass Cards</div>
        <div class="system-item"><span></span>Electric Blue</div>
        <div class="system-item"><span></span>Purple Accent</div>
        <div class="system-item"><span></span>Soft Shadows</div>
        <div class="system-item"><span></span>Premium Motion</div>
      </section>

      <section class="screen-board" id="screenBoard" aria-label="LifeOS AI screen collection"></section>
    </main>

    <script src="./screens.js"></script>
  </body>
</html>
